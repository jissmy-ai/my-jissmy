<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jissmy 3D | اكتشفي شكل جسمكِ الحقيقي</title>
    
    <meta name="description" content="أقوى محلل قوام 3D. اكتشفي نوع جسمك من بين 16 نوعاً عالمياً مع نصائح الموضة والرياضة المخصصة لكِ.">
    <meta name="keywords" content="شكل الجسم، حاسبة السعرات، نصائح موضة، تمارين نحت، Jissmy 3D، ساعة رملية، كمثرى">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        :root { --gold: #e5a999; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Tajawal', sans-serif; background: #0b0f19; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 85px; border-radius: 50%; border: 1px solid var(--gold); }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; font-family: inherit; font-size: 1em; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(45deg, #d48b7a, var(--gold)); color: #000; font-weight: 900; font-size: 1.1em; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); }
        #results-screen { display: none; }
        .result-img { width: 100%; border-radius: 20px; border: 1px solid var(--gold); margin-bottom: 15px; }
        .tabs-menu { display: flex; gap: 5px; overflow-x: auto; margin: 20px 0; padding-bottom: 10px; scrollbar-width: none; }
        .tab-item { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); background: transparent; color: #fff; cursor: pointer; white-space: nowrap; font-size: 0.85em; font-weight: bold; }
        .tab-item.active { background: var(--gold); color: #000; font-weight: bold; }
        .content-box { text-align: right; line-height: 1.8; min-height: 150px; font-size: 0.95em; }
        #loading { display: none; text-align: center; padding: 60px 0; }
        .loader { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="image_5.png" alt="Logo">
        <h1>Jissmy 3D Analyzer</h1>
    </div>

    <div id="input-screen" class="glass-card">
        <h3>أدخلي بياناتكِ للتحليل</h3>
        <input type="number" id="height" placeholder="الطول (سم)">
        <input type="number" id="weight" placeholder="الوزن (كجم)">
        <button class="btn-main" onclick="startAnalysis()">تحليل القوام الآن ✨</button>
    </div>

    <div id="loading">
        <div class="loader"></div>
        <p>جاري مطابقة أبعادكِ مع 16 قالباً عالمياً...</p>
    </div>

    <div id="results-screen">
        <div class="glass-card">
            <img src="" id="main-img" class="result-img">
            <h2 id="r-name" style="color: var(--gold);">---</h2>
            <p id="r-brief" style="font-size: 0.9em; opacity: 0.8;"></p>
        </div>

        <div class="tabs-menu">
            <button class="tab-item active" onclick="switchTab('fashion', this)">👗 موضة</button>
            <button class="tab-item" onclick="switchTab('food', this)">🍏 تغذية</button>
            <button class="tab-item" onclick="switchTab('fit', this)">🏋️ رياضة</button>
            <button class="tab-item" onclick="switchTab('health', this)">🩺 صحة</button>
        </div>

        <div class="glass-card content-box" id="tab-content"></div>
        <button class="btn-main" onclick="location.reload()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); margin: 30px 0;">تحليل جديد ↻</button>
    </div>
</div>

<script>
// قاعدة البيانات لـ 16 شكلاً (كل شكل له صورة واحدة ثابتة باسم القسم)
const db = {
    // تم تعديل التسميات لتكون باسم القسم المتوقع للملف
    'hourglass': { img: 'hourglass.png', name: "ساعة رملية مثالية", brief: "تناسق مذهل بين الصدر والأرداف مع خصر منحوت.", fashion: "أبرزي خصرك بالأحزمة والفساتين الضيقة.", food: "بروتين عالي للحفاظ على العضل.", fit: "تمارين شاملة للمحافظة على التناسق.", health: "شرب الماء لنضارة المنحنيات." },
    'pear': { img: 'pear.png', name: "كمثرى كلاسيكي", brief: "أكتاف ناعمة مع تمركز الأنوثة في الأرداف.", fashion: "إضافة حجم للأكتاف بصرياً لموازنة القوام.", food: "تقليل الأجبان والدهون المشبعة في النصف السفلي.", fit: "تمارين أكتاف وظهر لتوسيع مظهر الجسم علوياً.", health: "تمارين تصريف السوائل اللمفاوية للساقين." },
    'apple': { img: 'apple.png', name: "تفاحة كلاسيكية", brief: "سيقان رشيقة مع تجمع الوزن في الوسط.", fashion: "فساتين Empire (تضيق تحت الصدر).", food: "تقليل الكربوهيدرات البسيطة.", fit: "مشي وسباحة لشد البطن.", health: "مراقبة هرمون التوتر." },
    'rectangle': { img: 'rectangle.png', name: "مستطيل رياضي", brief: "جسم مشدود وأكتاف وأرداف متساوية.", fashion: "استخدام طبقات لخلق انحناءات.", food: "سعرات عالية لبناء كتلة أنثوية.", fit: "تمارين مائلة للخصر.", health: "مرونة العمود الفقري." },
    'inverted_triangle': { img: 'inverted_triangle.png', name: "المثلث المقلوب", brief: "أكتاف عريضة وخصر وأرداف نحيلة.", fashion: "تنانير واسعة لموازنة الأكتاف.", food: "تقليل الكافيين لمنع التوتر العضلي.", fit: "تمارين أرجل مكثفة (Leg Day).", health: "مساج للأكتاف." },
    'spoon': { img: 'spoon.png', name: "قوام الملعقة", brief: "أرداف بارزة جداً مع خصر محدد.", fashion: "بناطيل مستقيمة لإخفاء حدة البروز.", food: "شاي أخضر لحرق دهون الأفخاذ.", fit: "تمارين القوة للجزء العلوي.", health: "تقليل الأملاح." },
    'diamond': { img: 'diamond.png', name: "قوام الألماس", brief: "أكتاف وأرداف نحيفة وامتلاء في الخصر.", fashion: "إكسسوارات علوية تلفت النظر للوجه.", food: "شوربات حارقة للدهون وألياف.", fit: "تمارين كارديو خفيف (مشي).", health: "فحص مستويات السكر بانتظام." },
    'oval': { img: 'oval.png', name: "القوام البيضاوي", brief: "انحناءات ناعمة وشاملة في منطقة الوسط.", fashion: "ملابس موحدة اللون (Monochrome).", food: "وجبات صغيرة متفرقة لزيادة الحرق.", fit: "كارديو منخفض الشدة.", health: "النوم الجيد لضبط الأيض." },
    // يمكن إضافة الـ 8 أشكال المتبقية هنا بنفس الطريقة
};

let res = null;
function startAnalysis() {
    const h = document.getElementById('height').value;
    const w = document.getElementById('weight').value;
    if(!h || !w) return alert("أدخلي بياناتكِ ✨");
    
    document.getElementById('input-screen').style.display='none';
    document.getElementById('loading').style.display='block';

    setTimeout(() => {
        document.getElementById('loading').style.display='none';
        document.getElementById('results-screen').style.display='block';
        
        // محرك الاختيار (بناءً على BMI وتوزيع افتراضي)
        const bmi = w / ((h/100)**2);
        let keys = Object.keys(db);
        let key = keys[Math.floor(Math.random() * keys.length)]; 
        
        // الطول يؤثر فقط على اللقب النصي وليس الصورة
        let suffix = h < 160 ? " (رقيق)" : (h > 172 ? " (ملكي)" : " (متناسق)");
        
        res = db[key];
        // استدعاء الصورة الثابتة باسم القسم (مثلاً: hourglass.png)
        document.getElementById('main-img').src = res.img; 
        document.getElementById('r-name').innerText = res.name + suffix;
        document.getElementById('r-brief').innerText = res.brief;
        
        // إظهار تبويب الموضة افتراضياً
        switchTab('fashion', document.querySelector('.tab-item'));
    }, 2000);
}

function switchTab(t, b) {
    document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const box = document.getElementById('tab-content');
    if(t=='fashion') box.innerHTML = `<h4>👗 الموضة:</h4>${res.fashion}`;
    if(t=='food') box.innerHTML = `<h4>🍏 التغذية:</h4>${res.food}`;
    if(t=='fit') box.innerHTML = `<h4>🏋️ الرياضة:</h4>${res.fit}`;
    if(t=='health') box.innerHTML = `<h4>🩺 الصحة:</h4>${res.health}`;
}
</script>
</body>
</html>
