<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الجسم الشامل 3D</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        /* --- التصميم الزجاجي الاحترافي (Glassmorphism) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1, h2, h3 { text-align: center; }

        /* المدخلات */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], select {
            width: 100%; padding: 10px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.8); color: #333; font-size: 16px; box-sizing: border-box;
        }
        
        /* أزرار اختيار الشكل */
        .shapes-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .shape-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 10px; cursor: pointer; color: #fff; transition: 0.3s;
        }
        .shape-btn.active { background: #ff7e5f; border-color: #ff7e5f; font-weight: bold; }

        button.main-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(45deg, #ff7e5f, #feb47b); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,126,95,0.4);
        }
        button.main-btn:hover { transform: translateY(-2px); }

        /* منطقة النتيجة */
        #resultSection { display: none; margin-top: 30px; }
        
        /* إعدادات المجسم 3D */
        model-viewer {
            width: 100%; height: 400px; border-radius: 15px;
            background: rgba(0,0,0,0.2); margin-bottom: 20px;
        }

        /* الغزل وقراءة المزيد */
        .flirt-box {
            background: rgba(255,255,255,0.15); padding: 20px; border-radius: 15px; margin-bottom: 20px;
            border-right: 4px solid #feb47b;
        }
        .read-more-text { display: none; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .read-more-btn { color: #feb47b; cursor: pointer; text-decoration: underline; font-size: 14px; }

        /* أزرار الخدمات (تغذية، رياضة، طبي، موضة) */
        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 20px;
        }
        .service-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            padding: 15px; border-radius: 10px; color: white; cursor: pointer; transition: 0.3s;
        }
        .service-btn:hover { background: rgba(255,255,255,0.2); }

        /* محتوى الخدمات المنبثق */
        .service-content {
            display: none; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-top: 15px;
        }

        /* حاسبة الدايت */
        .diet-options { display: flex; gap: 10px; margin-bottom: 15px; }
        .diet-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; }
        .gain-btn { background: #4caf50; color: white; }
        .loss-btn { background: #f44336; color: white; }
        
        .macros-box { display: flex; justify-content: space-between; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center;}
        .macro-item { flex: 1; }
        .macro-item span { display: block; font-size: 20px; font-weight: bold; color: #feb47b; }

        .share-box { margin-top: 20px; text-align: center; }
        .share-btn { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="glass-container">
    <h1>تحليل قوامكِ الشامل 💎</h1>
    
    <div class="input-group">
        <label>الوزن (كجم):</label>
        <input type="number" id="weight" placeholder="مثال: 70">
    </div>
    <div class="input-group">
        <label>الطول (سم):</label>
        <input type="number" id="height" placeholder="مثال: 165">
    </div>
    <div class="input-group">
        <label>العمر:</label>
        <input type="number" id="age" placeholder="مثال: 25">
    </div>

    <label>اختاري شكل جسمكِ الأقرب:</label>
    <div class="shapes-grid" id="shapeSelector">
        <div class="shape-btn" onclick="selectShape('hourglass', this)">الساعة الرملية</div>
        <div class="shape-btn" onclick="selectShape('pear', this)">الكمثرى</div>
        <div class="shape-btn" onclick="selectShape('apple', this)">التفاحة</div>
        <div class="shape-btn" onclick="selectShape('rectangle', this)">المستطيل</div>
    </div>

    <button class="main-btn" onclick="analyzeBody()">حلل النتيجة الآن 🚀</button>

    <div id="resultSection">
        <h2 id="resultTitle">النتيجة</h2>
        
        <model-viewer id="bodyImage" src="" auto-rotate rotation-speed="15%" camera-controls touch-action="pan-y"></model-viewer>

        <div class="flirt-box">
            <h3 style="margin-top:0; color: #feb47b;">✨ جمالكِ الفريد</h3>
            <div id="shortFlirt"></div>
            <div class="read-more-text" id="longFlirt"></div>
            <span class="read-more-btn" onclick="toggleReadMore(this)">قراءة المزيد...</span>
        </div>

        <div class="services-grid">
            <button class="service-btn" onclick="showService('nutrition')">🥗 النظام الغذائي</button>
            <button class="service-btn" onclick="showService('workout')">🏋️ البرنامج الرياضي</button>
            <button class="service-btn" onclick="showService('medical')">🩺 النصائح الطبية</button>
            <button class="service-btn" onclick="showService('fashion')">👗 أسرار الموضة</button>
        </div>

        <div id="nutritionContent" class="service-content">
            <h3>حاسبة السعرات والماكروز الدقيقة</h3>
            <p>اختر هدفك لحساب احتياجك (مبني على وزنك وحالتك):</p>
            <div class="diet-options">
                <button class="diet-btn gain-btn" onclick="calculateMacros('gain')">📈 بناء عضل / زيادة وزن</button>
                <button class="diet-btn loss-btn" onclick="calculateMacros('loss')">📉 تنشيف / حرق دهون</button>
            </div>
            <div id="macrosResult" style="display:none;">
                <h2 id="totalCalories" style="color:#feb47b;">0 سعرة</h2>
                <div class="macros-box">
                    <div class="macro-item">بروتين <span id="proteinGrams">0g</span></div>
                    <div class="macro-item">كارب <span id="carbsGrams">0g</span></div>
                    <div class="macro-item">دهون <span id="fatsGrams">0g</span></div>
                </div>
            </div>
        </div>

        <div id="workoutContent" class="service-content">
            <h3>البرنامج الرياضي المخصص</h3>
            <div class="diet-options">
                <button class="diet-btn" style="background:#333;" onclick="showWorkout('gym')">🏢 في الجيم (أوزان)</button>
                <button class="diet-btn" style="background:#555;" onclick="showWorkout('home')">🏠 في المنزل (وزن الجسم)</button>
            </div>
            <div id="workoutPlan" style="margin-top:15px; line-height:1.6;"></div>
        </div>

        <div id="medicalContent" class="service-content">
            <h3>🩺 التحليل الطبي الحيوي</h3>
            <div id="medicalText" style="line-height:1.6;"></div>
        </div>

        <div id="fashionContent" class="service-content">
            <h3>👗 دليلك للموضة</h3>
            <div id="fashionText" style="line-height:1.6;"></div>
        </div>

        <div class="share-box">
            <p id="sharePreview" style="font-size:14px; opacity:0.8; margin-bottom:5px;"></p>
            <button class="share-btn" onclick="shareResult()">📲 شارك نتيجتك مع أصدقائك</button>
        </div>
    </div>
</div>

<script>
    // --- 1. قاعدة البيانات المركزية (المنطق الكامل للـ 16 حالة) ---
    const bodyData = {
        'hourglass': {
            title: 'الساعة الرملية ⏳',
            models: { underweight: 'Underweight_Hourglass.glb', normal: 'Normal_Hourglass.glb', overweight: 'Overweight_Hourglass.glb', obese: 'Obese_Hourglass.glb' },
            flirt: {
                tall: { short: "طولكِ الشاهق يمنح انحناءات الساعة الرملية لديكِ هيبة ملكية لا تضاهى.", full: "كل سنتيمتر في قامتكِ يبرز تناسق خصركِ المنحوت ويزيدكِ شموخاً وجاذبية تخطف الأنفاس بصمت، أنتِ أسطورة حية للجمال." },
                short: { short: "قامتكِ الرقيقة تمنحكِ سحراً أنثوياً مضاعفاً وتكثف انحناءاتك الساحرة.", full: "تتوزع منحنيات الساعة الرملية في قالب ناعم يفيض بالفتنة والرقة، مما يجعلكِ أيقونة للجمال الكلاسيكي المتناسق بدقة فنان." }
            },
            fashion: "اعتمدي على الأحزمة لتحديد خصركِ النحيل. الفساتين بقصة (Wrap) والبنطلونات عالية الخصر ستبرز تناسق جسدكِ المثالي بشكل مذهل.",
            workout_gym: "ركزي على تمارين الـ Squat و Hip Thrusts مع أوزان حرة لتعزيز القوة السفلية، وتمارين الأكتاف (Overhead Press) للحفاظ على التناسق العلوي.",
            workout_home: "تمارين الـ Glute Bridges و Lunges بوزن الجسم، مع تمارين مقاومة بـ (Resistance Bands) لشد الجسم بالكامل والحفاظ على الانحناءات."
        },
        'pear': {
            title: 'الكمثرى 🍐',
            models: { underweight: 'Underweight_Pear.glb', normal: 'Normal_Pear.glb', overweight: 'Overweight_Pear.glb', obese: 'Obese_Pear.glb' },
            flirt: {
                tall: { short: "طولكِ الملحوظ يوزع منحنيات جسدكِ الفاتنة برقيّ مذهل.", full: "يبرز وركيكِ الممتلئين بأسلوب انسيابي يمنحكِ قوام العارضات الأرستقراطي، مما يجعل كل خطوة تعكس ثقة ملكية وأنوثة طاغية." },
                short: { short: "جمالكِ الرقيق يتركز في خصركِ النحيل ومنحنياتكِ السفلى الممتلئة.", full: "هذا التباين يمنحكِ مظهراً يفيض بالأنوثة الطاغية والجاذبية المركزة التي تمنح قامتكِ حضوراً قوياً ولا يُنسى أبداً." }
            },
            fashion: "ابحثي عن البلوزات ذات التفاصيل على الأكتاف (كشكشة أو ألوان فاتحة) لموازنة الجزء العلوي مع السفلي. التنانير بقصة (A-Line) هي الأفضل لكِ.",
            workout_gym: "لتحسين الأداء، ركزي على الـ Deadlift و Leg Press لبناء قوة جبارة في الجزء السفلي، مع تمارين Lat Pulldown لتعريض الظهر قليلاً وخلق توازن.",
            workout_home: "تمارين الكارديو (مثل صعود الدرج) لحرق الدهون، مع تمارين Squat الجانبية و Donkey Kicks لشد الجزء السفلي بشكل متناسق."
        },
        'apple': {
            title: 'التفاحة 🍎',
            models: { underweight: 'Underweight_Apple.glb', normal: 'Normal_Apple.glb', overweight: 'Overweight_Apple.glb', obese: 'Obese_Apple.glb' },
            flirt: {
                tall: { short: "طولكِ الفارع يمنح قوامكِ المتألق توازناً فريداً ويسحب العين لسيقانكِ الممشوقة.", full: "هذا يمنح جذعكِ الممتلئ هيبة وجمالاً يجمع بين القوة والأنوثة في آن واحد، حضوركِ قوي ومفعم بالجاذبية الفاتنة." },
                short: { short: "قامتكِ الناعمة تمنحكِ تدويرة جمالية محببة تفيض بالحيوية والمرح.", full: "تبرز سيقانكِ الرشيقة كعنصر قوة يكسر حدة الامتلاء في الوسط ويمنحكِ طابعاً أنثوياً مرحاً وجذاباً للغاية يسرق القلوب." }
            },
            fashion: "الفساتين بقصة (Empire Waist) التي تتسع من أسفل الصدر مباشرة تخفي البطن وتبرز سيقانكِ الجميلة. اختاري الياقات بشكل (V) لإطالة الرقبة والجذع.",
            workout_gym: "ركزي على الرفع الثقيل المركب؛ Bench Press و Rows لتقوية الجذع، وتمارين Core قوية (Planks و Cable Crunches) للتحكم بمنطقة الوسط.",
            workout_home: "كارديو عالي الكثافة (HIIT) ممتاز لكِ. مع تمارين معدة شاملة مثل Mountain Climbers و Leg Raises لشد الكور بالكامل."
        },
        'rectangle': {
            title: 'المستطيل 📏',
            models: { underweight: 'Underweight_Rectangle.glb', normal: 'Normal_Rectangle.glb', overweight: 'Overweight_Rectangle.glb', obese: 'Obese_Rectangle.glb' },
            flirt: {
                tall: { short: "طولكِ الشامخ يمنح قوامكِ الرياضي طابعاً عصرياً يشبه عارضات الأزياء.", full: "تتساوى الأكتاف والوركين باستقامة توحي بالثقة المطلقة، مما يجعلكِ ملكة الإطلالات العصرية المذهلة التي تلفت الأنظار بقوتها وجمالها." },
                short: { short: "قامتكِ الصغيرة تمنح جسدكِ الرياضي تماسكاً وجاذبية فريدة.", full: "تبدين كفراشة رشيقة وقوية في آن واحد، مما يمنحكِ سحراً خاصاً يجمع بين الرقة والنشاط الدائم، بساطتكِ هي سر تميزكِ." }
            },
            fashion: "مهمتك خلق انحناءات وهمية. استخدمي الملابس ذات الطبقات، الجيوب الجانبية، والفساتين التي تحتوي على حزام وسط عريض لكسر الاستقامة.",
            workout_gym: "لبناء منحنيات: ركزي على الأوزان الثقيلة للأكتاف (Lateral Raises) وللأرداف (Heavy Squats و Romanian Deadlifts) لخلق وهم الخصر النحيف.",
            workout_home: "تمارين Push-ups لتقوية الجزء العلوي، و Jump Squats للجزء السفلي، مع التركيز على تمرين Russian Twists لنحت الخصر."
        }
    };

    // --- 2. متغيرات الحالة ---
    let selectedShape = '';
    let currentData = {};
    let currentBmiCat = '';
    let userWeight = 0;
    let userHeight = 0;

    // اختيار الشكل من الأزرار
    function selectShape(shape, btnElement) {
        selectedShape = shape;
        document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
    }

    // --- 3. المحرك الأساسي للتحليل ---
    function analyzeBody() {
        userWeight = parseFloat(document.getElementById('weight').value);
        userHeight = parseFloat(document.getElementById('height').value);
        let age = parseFloat(document.getElementById('age').value);

        if(!userWeight || !userHeight || !selectedShape) {
            alert("يرجى إدخال الوزن والطول واختيار الشكل أولاً!");
            return;
        }

        // حساب الـ BMI الدقيق وتحديد المفتاح الإنجليزي للمجسم 3D
        let heightM = userHeight / 100;
        let bmi = userWeight / (heightM * heightM);
        
        let bmiKey = 'normal';
        if (bmi < 18.5) { bmiKey = 'underweight'; currentBmiCat = 'نقص وزن'; }
        else if (bmi < 25) { bmiKey = 'normal'; currentBmiCat = 'وزن مثالي'; }
        else if (bmi < 30) { bmiKey = 'overweight'; currentBmiCat = 'زيادة وزن'; }
        else { bmiKey = 'obese'; currentBmiCat = 'سمنة'; }

        // تحديد القامة (الطول)
        let heightStatus = userHeight >= 165 ? 'tall' : 'short';

        // استخراج البيانات
        currentData = bodyData[selectedShape];

        // 1. تحديث المجسم 3D

        document.getElementById('bodyImage').src = `./${currentData.models[bmiKey]}`;
        
        document.getElementById('resultTitle').innerText = currentData.title;

        // 2. تحديث نصوص الغزل (الملخص + التفاصيل)
        document.getElementById('shortFlirt').innerText = currentData.flirt[heightStatus].short;
        document.getElementById('longFlirt').innerText = currentData.flirt[heightStatus].full;
        document.getElementById('longFlirt').style.display = "none"; // إخفاء التفاصيل مبدئياً

        // 3. تجهيز النص الطبي
        let waterLiters = (userWeight * 0.033).toFixed(1);
        document.getElementById('medicalText').innerHTML = `
            <b>تصنيف كتلة الجسم (BMI):</b> ${bmi.toFixed(1)} (${currentBmiCat})<br><br>
            <b>الاحتياج المائي الخلوي:</b> ${waterLiters} لتر يومياً.<br><br>
            <b>نصيحة حيوية:</b> استناداً لحالتك (${currentBmiCat}) وشكل جسدك (${currentData.title})، يجب التركيز على إدارة هرمون الكورتيزول من خلال النوم العميق (7-8 ساعات) لضمان عدم تخزين الدهون في مناطق غير مرغوبة، مع التأكد من تناول مغذيات دقيقة تدعم صحة المفاصل.`;

        // 4. تجهيز نص الموضة
        document.getElementById('fashionText').innerText = currentData.fashion;

        // 5. تجهيز نص المشاركة
        document.getElementById('sharePreview').innerText = `معاينة: "حللت قوامي وطلع ${currentData.title} بتصنيف ${currentBmiCat}.. جربي الحين!"`;

        // إظهار قسم النتائج وإغلاق الخدمات المفتوحة
        document.getElementById('resultSection').style.display = 'block';
        document.querySelectorAll('.service-content').forEach(el => el.style.display = 'none');
    }

    // --- 4. حاسبة الماكروز الدقيقة (المنطق الرياضي) ---
    function calculateMacros(goal) {
        // حساب السعرات الأساسية TDEE (معادلة مبسطة للرياضيين: وزن * 24 * 1.3 نشاط متوسط)
        let tdee = Math.round(userWeight * 24 * 1.3);
        let targetCalories = goal === 'gain' ? tdee + 500 : tdee - 500;
        
        // حساب الماكروز (منطق قوي: بروتين 2.2ج/كج، دهون 1ج/كج، الباقي كارب)
        let protein = Math.round(userWeight * 2.2);
        let fats = Math.round(userWeight * 1.0);
        
        // السعرات المتبقية للكارب (البروتين=4، الدهون=9، الكارب=4)
        let remainingCals = targetCalories - (protein * 4) - (fats * 9);
        let carbs = Math.max(0, Math.round(remainingCals / 4)); 

        document.getElementById('totalCalories').innerText = `${targetCalories} سعرة حرارية يومياً`;
        document.getElementById('proteinGrams').innerText = `${protein}g`;
        document.getElementById('carbsGrams').innerText = `${carbs}g`;
        document.getElementById('fatsGrams').innerText = `${fats}g`;
        
        document.getElementById('macrosResult').style.display = 'block';
    }

    // --- 5. البرامج الرياضية ---
    function showWorkout(location) {
        let text = location === 'gym' ? currentData.workout_gym : currentData.workout_home;
        document.getElementById('workoutPlan').innerHTML = `<b>برنامجك المخصص:</b><br>${text}<br><br><i>ملاحظة: تأكدي من الإحماء الجيد قبل البدء والالتزام بالمدى الحركي الكامل.</i>`;
    }

    // --- 6. دوال مساعدة (UI & Share) ---
    function toggleReadMore(btn) {
        const fullText = document.getElementById('longFlirt');
        if (fullText.style.display === "none") {
            fullText.style.display = "block";
            btn.innerText = "إخفاء التفاصيل";
        } else {
            fullText.style.display = "none";
            btn.innerText = "قراءة المزيد...";
        }
    }

    function showService(serviceId) {
        document.querySelectorAll('.service-content').forEach(el => el.style.display = 'none');
        document.getElementById(serviceId + 'Content').style.display = 'block';
    }

    function shareResult() {
        const shareText = `حللت قوامي وطلع شكل ${currentData.title} بتصنيف ${currentBmiCat}! اكتشفي النتيجة الخاصة بك وتفاصيل الماكروز والتمرين في الموقع.`;
        if (navigator.share) {
            navigator.share({ title: 'تحليل الجسم 3D', text: shareText }).catch(console.error);
        } else {
            alert('تم نسخ النص للمشاركة:\n' + shareText);
        }
    }
</script>
