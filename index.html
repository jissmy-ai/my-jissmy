<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jissmy 3D | المحلل الاحترافي الشامل</title>
    
    <meta name="description" content="أقوى محلل قوام 3D بالذكاء الاصطناعي. اكتشفي شكل جسمكِ واحصل على برامج تغذية ورياضة وموضة مخصصة بالكامل.">
    <meta name="keywords" content="شكل الجسم، حاسبة السعرات، تنسيق الملابس، تمارين نحت، Jissmy 3D، الماكروز، BMI">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        /* تم تعزيز الألوان الزجاجية هنا فقط */
        :root { --gold: #e5a999; --glass: rgba(255, 255, 255, 0.08); --bg: #0b0f19; }
        
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header img { width: 95px; border-radius: 50%; border: 2px solid var(--gold); padding: 5px; box-shadow: 0 0 20px rgba(229, 169, 153, 0.3); }
        .header h1 { font-size: 1.8em; font-weight: 900; color: var(--gold); margin-top: 15px; }

        /* تم تطبيق مظهر الزجاج العصري (Glassmorphism) باحترافية */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-top: 1px solid rgba(255,255,255,0.2); /* لمعة زجاجية علوية */
            border-left: 1px solid rgba(255,255,255,0.1); /* لمعة زجاجية جانبية */
            border-radius: 35px; 
            padding: 30px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); /* ظل زجاجي عميق */
            animation: fadeIn 1s ease;
        }

        input, select { 
            width: 100%; padding: 18px; margin: 12px 0; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: #fff; font-family: inherit; box-sizing: border-box; outline: none; transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); /* تأثير العمق للإدخال */
        }
        
        input:focus, select:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        .btn-main { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            background: linear-gradient(135deg, #d48b7a 0%, var(--gold) 100%); 
            color: #0b0f19; font-weight: 900; font-size: 1.1em; cursor: pointer; transition: 0.4s ease;
            box-shadow: 0 4px 15px rgba(229, 169, 153, 0.4);
        }

        #results-area { display: none; }
        .result-img { width: 100%; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }

        .bmi-badge {
            background: rgba(229, 169, 153, 0.15); color: var(--gold);
            padding: 10px 20px; border-radius: 15px; display: inline-block;
            margin: 15px 0; font-weight: 900; border: 1px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .action-tabs { display: flex; gap: 10px; overflow-x: auto; margin: 25px 0; padding-bottom: 12px; scrollbar-width: none; }
        .tab-btn { 
            flex: 1; min-width: 90px; padding: 14px 10px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.7); cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #0b0f19; border-color: var(--gold); box-shadow: 0 0 10px rgba(229, 169, 153, 0.3); }

        .service-panel { display: none; text-align: right; animation: slideUp 0.6s ease; }
        .service-panel h4 { color: var(--gold); font-size: 1.3em; margin-bottom: 15px; border-right: 3px solid var(--gold); padding: 0 10px; }

        .program-box { 
            background: rgba(0,0,0,0.25); border-radius: 20px; padding: 20px; margin-top: 15px; 
            text-align: right; border-left: 4px solid var(--gold); 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .program-box ul { padding-right: 20px; margin: 10px 0; }
        .program-box li { margin-bottom: 8px; font-size: 0.95em; }

        .read-more { color: var(--gold); cursor: pointer; font-size: 0.9em; font-weight: bold; display: inline-block; margin-top: 10px; }
        .extra-content { display: none; margin-top: 15px; font-size: 0.95em; opacity: 0.85; line-height: 1.8; padding: 10px; border-top: 1px dashed var(--gold); }

        #loader { display: none; text-align: center; padding: 50px; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(229, 169, 153, 0.2); border-top-color: var(--gold); border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto; }
        @keyframes s { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>

  
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="image_5.png" alt="Logo">
        <h1>Jissmy 3D</h1>
    </div>

    <div id="setup-screen" class="glass-card">
        <h3>اكتشفي بُعدكِ الثالث ✨</h3>
        <input type="number" id="mainHeight" placeholder="الطول (سم)">
        <input type="number" id="mainWeight" placeholder="الوزن (كجم)">
        
        <label style="display: block; text-align: right; font-size: 0.85em; margin-top: 10px; color: var(--gold);">اختاري شكل جسمكِ المبدئي:</label>
        <select id="initialShape">
            <option value="hourglass">ساعة رملية (متناسق)</option>
            <option value="pear">كمثرى (ممتلئ من الأسفل)</option>
            <option value="apple">تفاحة (ممتلئ من الوسط)</option>
            <option value="rectangle">مستطيل (رياضي/عادي)</option>
        </select>
        
        <button class="btn-main" onclick="analyzeFirst()" style="margin-top: 10px;">بدء التحليل الرقمي 🧬</button>
    </div>

    <div id="loader"><div class="spinner"></div><p style="margin-top:20px; color:var(--gold);">جاري معالجة الـ 16 بعداً حيوياً...</p></div>

    <div id="results-area">
        <div class="glass-card">
            <model-viewer id="bodyImage" src="" class="result-img" auto-rotate rotation-speed="15%" camera-controls touch-action="pan-y" style="width: 100%; height: 500px;"></model-viewer>
            <h2 id="bodyTitle" style="color:var(--gold);"></h2>
            <div id="bmiDisplay" class="bmi-badge"></div>
            <p id="bodyBrief" style="line-height:1.8;"></p>
            <button class="btn-main" onclick="shareResult()" style="margin-top: 15px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 1em; padding: 15px;">📤 مشاركة نتيجتي الساحرة</button>
            
        </div>

        <div class="action-tabs">
            <button class="tab-btn active" onclick="openService('fashion', this)">👗 موضة</button>
            <button class="tab-btn" onclick="openService('nutrition', this)">🍏 تغذية</button>
            <button class="tab-btn" onclick="openService('fitness', this)">🏋️ رياضة</button>
            <button class="tab-btn" onclick="openService('health', this)">🩺 صحة</button>
        </div>

        <div id="service-container" class="glass-card">
            <div id="panel-fashion" class="service-panel" style="display:block">
                <h4>برنامج المظهر الهندسي</h4>
                <select id="fashionType"><option value="daily">إطلالة عملية</option><option value="party">سهرة فاخرة</option></select>
                <button class="btn-main" onclick="runFashion()">توليد كود الأناقة</button>
                <div id="fashionRes"></div>
            </div>

            <div id="panel-nutrition" class="service-panel">
                <h4>برنامج الأيض الدقيق</h4>
                <select id="nutriGoal"><option value="lose">نحت (خسارة دهون)</option><option value="build">بناء وزيادة وزن (منحنيات)</option></select>
                <button class="btn-main" onclick="runNutri()">حساب الماكروز بالغرام</button>
                <div id="nutriRes"></div>
            </div>

            <div id="panel-fitness" class="service-panel">
                <h4>برنامج التدريب العلمي</h4>
                <select id="fitPlace"><option value="home">تمرين منزلي</option><option value="gym">تمرين النادي</option></select>
                <button class="btn-main" onclick="runFit()">توليد جدول التمرين</button>
                <div id="fitRes"></div>
            </div>

            <div id="panel-health" class="service-panel">
                <h4>تقرير التوازن الحيوي</h4>
                <button class="btn-main" onclick="runHealth()">تحديث التقرير الصحي</button>
                <div id="healthRes"></div>
            </div>
        </div>

        <button class="btn-main" onclick="location.reload()" style="background:transparent; border:1px solid var(--gold); color:var(--gold); margin:30px 0;">إعادة الفحص ↻</button>
    </div>
</div>

<script>
    const types = {
        'hourglass': { title: 'الساعة الرملية', img: 'obese_hourglass.glb', 
            tall: 'طولكِ الشاهق يمنح انحناءات الساعة الرملية لديكِ هيبة ملكية لا تضاهى، فكل سنتيمتر في قامتكِ يبرز تناسق خصركِ المنحوت ويزيدكِ شموخاً وجاذبية تخطف الأنفاس بصمت.',
            short: 'قامتكِ الرقيقة تمنحكِ سحراً أنثوياً مضاعفاً، حيث تتكثف انحناءات الساعة الرملية في قالب ناعم يفيض بالفتنة والرقة، مما يجعلكِ أيقونة للجمال الكلاسيكي المتناسق بدقة فنان.'
        },
        'pear': { title: 'الكمثرى', img: 'obese_pear.glb', 
            tall: 'طولكِ الملحوظ يوزع منحنيات جسدكِ الفاتنة برقيّ مذهل، حيث يبرز وركيكِ الممتلئين بأسلوب انسيابي يمنحكِ قوام العارضات الأرستقراطي، مما يجعل كل خطوة تعكس ثقة ملكية.',
            short: 'جمالكِ الرقيق يتركز في خصركِ النحيل ومنحنياتكِ السفلى الممتلئة، مما يمنحكِ مظهراً يفيض بالأنوثة الطاغية والجاذبية المركزة التي تمنح قامتكِ حضوراً قوياً ولا يُنسى أبداً.'
        },
        'apple': { title: 'التفاحة', img: 'obese_apple.glb', 
            tall: 'طولكِ الفارع يمنح قوامكِ المتألق توازناً فريداً، حيث تسحب قامتكِ العين نحو سيقانكِ الرشيقة والمثيرة، مما يمنح جذعكِ الممتلئ هيبة وجمالاً يجمع بين القوة والأنوثة في آن واحد.',
            short: 'قامتكِ الناعمة تمنحكِ تدويرة جمالية محببة تفيض بالحيوية، حيث تبرز سيقانكِ الرشيقة كعنصر قوة يكسر حدة الامتلاء في الوسط ويمنحكِ طابعاً أنثوياً مرحاً وجذاباً للغاية.'
        },
        'rectangle': { title: 'المستطيل', img: 'obese_rectangle.glb', 
            tall: 'طولكِ الشامخ يمنح قوامكِ الرياضي طابعاً عصرياً يشبه عارضات الأزياء، حيث تتساوى الأكتاف والوركين باستقامة توحي بالثقة والقوة، مما يجعلكِ ملكة الإطلالات العصرية المذهلة.',
            short: 'قامتكِ الصغيرة تمنح جسدكِ الرياضي تماسكاً وجاذبية فريدة، حيث تبدين كفراشة رشيقة وقوية في آن واحد، مما يمنحكِ سحراً خاصاً يجمع بين الرقة والنشاط الدائم.'
        }
    };

    let user = { h:0, w:0, typeKey:'', bmi:0 };

    function analyzeFirst() {
        user.h = document.getElementById('mainHeight').value;
        user.w = document.getElementById('mainWeight').value;
        user.typeKey = document.getElementById('initialShape').value;
        
        if(!user.h || !user.w) return;

        // حساب BMI الضروري
        user.bmi = (user.w / ((user.h / 100) ** 2)).toFixed(1);

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('results-area').style.display = 'block';
            
            const data = types[user.typeKey];
            const briefContent = user.h >= 168 ? data.tall : data.short;
            const advice = " فنصيحتي لكِ أن تفتخري بهذا القوام وتبرزي جماله دوماً بثقة واعتزاز.";
            
            document.getElementById('bodyImage').src = data.img;
            document.getElementById('bodyTitle').innerText = data.title + (user.h >= 168 ? " الملكي" : " الرقيق");
            document.getElementById('bmiDisplay').innerText = "مؤشر كتلة جسمكِ (BMI): " + user.bmi;
            document.getElementById('bodyBrief').innerText = briefContent + advice;
        }, 1800);
    }

    function openService(s, btn) {
        document.querySelectorAll('.service-panel').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + s).style.display = 'block';
        btn.classList.add('active');
    }

    /* التعديلات الدقيقة والاحترافية تمت هنا فقط بناءً على طلبك */
    function runFashion() {
        const style = document.getElementById('fashionType').value;
        let res = `<div class="program-box"><b>📋 كود الأناقة الاحترافي:</b><ul>`;
        res += user.h >= 168 
            ? "<li><b>التناسب الهندسي:</b> لكونكِ طويلة، استغلي القصات الطويلة (Maxi) والكتل اللونية (Color Blocking) لإبراز شموخكِ.</li>" 
            : "<li><b>التناسب الهندسي:</b> لكونكِ رقيقة، اعتمدي الخصر العالي (High-Waist) واللون الموحد (Monochrome) لإعطاء إيحاء بطول الساقين.</li>";
        res += `</ul><span class="read-more" onclick="showMore(this)">✨ قراءة المزيد...</span><div class="extra-content">السر في الموضة هو "النسبة والتناسب". استخدمي الخطوط العمودية والأقمشة الانسيابية لتوجيه النظر دائماً نحو أجمل ملامح قوامكِ بناءً على شكل جسمكِ.</div></div>`;
        document.getElementById('fashionRes').innerHTML = res;
    }

    function runNutri() {
        const goal = document.getElementById('nutriGoal').value;
        let bmr = Math.round((10 * user.w) + (6.25 * user.h) - 161);
        bmr = goal === 'lose' ? bmr - 400 : bmr + 250; // حساب عجز أو فائض السعرات
        
        // حساب الماكروز علمياً الدقيق
        const p = Math.round(user.w * 1.8); // 1.8g لكل كيلو (بروتين)
        const f = Math.round(user.w * 0.8); // 0.8g لكل كيلو (دهون)
        const c_calories = bmr - ((p * 4) + (f * 9)); 
        const c = Math.round(c_calories > 0 ? c_calories / 4 : 0); // الباقي كربوهيدرات

        document.getElementById('nutriRes').innerHTML = `<div class="program-box"><b>📊 توزيع الماكروز (Macros):</b><ul><li><b>السعرات الهدف:</b> ${bmr} kcal</li><li><b>البروتين:</b> ${p}g (لبناء العضل)</li><li><b>الكربوهيدرات:</b> ${c}g (للطاقة)</li><li><b>الدهون الصحية:</b> ${f}g (للتوازن الهرموني)</li></ul><span class="read-more" onclick="showMore(this)">🍏 التفاصيل الأيضية...</span><div class="extra-content">هذه الأرقام مبنية على معادلة "Mifflin-St Jeor". مع مؤشر (BMI: ${user.bmi})، تأكدي من تناول الألياف لتنظيم سكر الدم وتوزيع البروتين على وجباتك لتحفيز الاستشفاء العضلي.</div></div>`;
    }

    function runFit() {
        const place = document.getElementById('fitPlace').value;
        let res = `<div class="program-box"><b>🏋️ البرنامج التدريبي العلمي:</b><ul>`;
        res += place === 'gym' 
            ? "<li><b>المقاومة:</b> تمارين مركبة (Squats, Deadlifts) لبناء قاعدة قوية.</li><li><b>العزل:</b> تمارين تركيز للمنحنيات (Glutes & Core).</li><li><b>القلب:</b> 20 دقيقة كارديو (HIIT) مرتين أسبوعياً.</li>" 
            : "<li><b>المقاومة:</b> تدريب بوزن الجسم وأربطة المقاومة (Bands).</li><li><b>المرونة:</b> بيلاتس لنحت الخصر وتقوية الجذع.</li><li><b>القلب:</b> 15 دقيقة تمارين قلبية مكثفة بالمنزل.</li>";
        res += `</ul><span class="read-more" onclick="showMore(this)">🔥 نصيحة رياضية...</span><div class="extra-content">السر الأهم في التدريب هو الزيادة التدريجية (Progressive Overload)، زيدي المقاومة أو التكرارات تدريجياً لضمان عدم ثبات النتائج.</div></div>`;
        document.getElementById('fitRes').innerHTML = res;
    }

    function runHealth() {
        let bmiCat = user.bmi < 18.5 ? "نقص وزن" : user.bmi < 25 ? "وزن مثالي" : user.bmi < 30 ? "زيادة وزن" : "سمنة";
        document.getElementById('healthRes').innerHTML = `<div class="program-box"><b>🩺 الفحص الحيوي الشامل:</b><ul><li><b>تصنيف الـ BMI:</b> ${user.bmi} (${bmiCat})</li><li><b>الاحتياج المائي:</b> ${(user.w * 0.033).toFixed(1)} لتر / يومياً للترطيب الخلوي.</li></ul><span class="read-more" onclick="showMore(this)">🩺 قراءة التقرير الطبي...</span><div class="extra-content">مؤشر كتلة الجسم هو قياس أولي. التركيز الأعمق يجب أن يكون على جودة نومك (7-8 ساعات) وإدارة التوتر للسيطرة على هرمون الكورتيزول، وهو الأساس لمنع تخزين الدهون العنيدة.</div></div>`;
    }

    function showMore(el) {
        const content = el.nextElementSibling;
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
        el.innerText = content.style.display === 'block' ? 'إخفاء التفاصيل ⌃' : '✨ قراءة المزيد...';
    }
        function shareResult() {
        const title = document.getElementById('bodyTitle').innerText;
        const bmi = document.getElementById('bmiDisplay').innerText;
        const shareText = `اكتشفت شكل جسمي الحقيقي ( ${title} ) عبر محلل Jissmy 3D! ✨\n${bmi}\nحللي قوامكِ واحصلي على برامجكِ الخاصة الآن!`;
        
        if (navigator.share) {
            navigator.share({
                title: 'Jissmy 3D - تحليل القوام',
                text: shareText,
                url: window.location.href // رابط موقعك
            }).catch(console.error);
        } else {
            // في حال كان المتصفح قديماً أو لا يدعم المشاركة المباشرة
            navigator.clipboard.writeText(shareText + "\n" + window.location.href);
            alert("تم نسخ النتيجة بنجاح! يمكنك الآن لصقها في أي مكان ومشاركتها.");
        }
        }
    
</script>
</body>
</html>
