<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Jissmy 3D | اكتشفي سحر قوامكِ ✨">
    <meta property="og:description" content="حللت بيانات جسمي وخرجت لي نتيجة مذهلة! جربي الآن">
    <meta property="og:image" content="https://jissmy-ai.github.io/my-jissmy/normal_hourglass.png"> 

    <title>Jissmy 3D | تحليل الأنوثة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff758c; --secondary: #4facfe; --bg: #0f0c29; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            background: radial-gradient(circle at center, #24243e 0%, #0f0c29 100%); color: #fff; overflow-x: hidden;
        }
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .circle { position: absolute; background: rgba(255, 117, 140, 0.05); border-radius: 50%; animation: move 20s infinite linear; }
        @keyframes move { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }

        .glass-card { 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; 
            padding: 25px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-top: 20px;
            transition: 0.3s;
        }
        h1 { font-size: 30px; margin: 0 0 10px 0; background: linear-gradient(45deg, #ff9a9e, #fad0c4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; font-family: 'Cairo'; outline: none; }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; font-weight: 900; font-size: 17px; cursor: pointer; }

        #result-box { display: none; width: 100%; }
        .bmi-badge { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 15px; margin-bottom: 15px; border: 1px dashed var(--secondary); }
        .bmi-number { font-size: 24px; font-weight: 900; color: var(--secondary); display: block; }
        
        /* تأثير الميلان 3D */
        .img-container { 
            width: 100%; height: 320px; margin: 15px 0; border-radius: 20px; 
            background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; 
            overflow: hidden; perspective: 1000px;
        }
        img.model-3d { 
            max-width: 90%; max-height: 90%; object-fit: contain; 
            transition: transform 0.5s ease; transform-style: preserve-3d;
        }
        .glass-card:hover img.model-3d {
            transform: rotateY(12deg) rotateX(5deg);
        }

        .ghazal-container { font-size: 17px; line-height: 1.6; margin: 15px 0; }
        .read-more { color: #4facfe; cursor: pointer; font-weight: 700; text-decoration: underline; display: block; margin-top: 8px; }
        .advice-card { background: rgba(255,255,255,0.07); padding: 12px; border-radius: 12px; font-size: 14px; margin-top: 15px; border-right: 4px solid #ff758c; text-align: right; }

        .btn-share { width: 100%; padding: 16px; border-radius: 50px; border: none; background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; font-weight: 900; font-size: 17px; cursor: pointer; animation: pulse 2s infinite; margin-top: 15px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(79, 172, 254, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0); } }
    </style>
</head>
<body>
<div class="bg-animate" id="bg"></div>
<div class="glass-card">
    <div id="input-screen">
        <h1>Jissmy 3D ✨</h1>
        <p style="opacity:0.8; font-size:14px;">اكتشفي أسرار أنوثتكِ بنظام ذكي</p>
        <input type="number" id="height" placeholder="الطول (سم)">
        <input type="number" id="weight" placeholder="الوزن (كجم)">
        <select id="body-shape">
            <option value="" disabled selected>ما هو شكل جسمكِ؟</option>
            <option value="pear">كمثرى 🍐</option>
            <option value="hourglass">ساعة رملية ⏳</option>
            <option value="apple">تفاحة 🍎</option>
            <option value="rectangle">مستطيل 📏</option>
        </select>
        <button class="btn-main" onclick="calculate()">اكتشفي النتيجة الآن</button>
    </div>

    <div id="result-box">
        <div class="bmi-badge">
            <span style="font-size: 12px; opacity: 0.8;">مؤشر الجمال الصحي (BMI):</span>
            <span class="bmi-number" id="bmi-val">0.0</span>
            <span id="health-desc" style="font-size: 14px;"></span>
        </div>
        <div class="img-container"><img id="model-img" class="model-3d" src=""></div>
        <div class="ghazal-container">
            <span id="intro-text"></span>
            <span id="full-text" style="display: none;"></span>
            <span id="more-btn" class="read-more" onclick="showFull()">قراءة باقي الوصف.. ✨</span>
        </div>
        <div class="advice-card" id="advice-text"></div>
        <button class="btn-share" onclick="shareResult()">تباهي بجمالكِ مع الصديقات 📲</button>
        <p onclick="location.reload()" style="cursor:pointer; opacity:0.5; font-size:12px; margin-top:15px;">تحليل جديد</p>
    </div>
</div>

<script>
    const bg = document.getElementById('bg');
    for (let i = 0; i < 8; i++) {
        const circle = document.createElement('div');
        circle.className = 'circle';
        const size = Math.random() * 60 + 30 + 'px';
        circle.style.width = size; circle.style.height = size;
        circle.style.left = Math.random() * 100 + 'vw';
        circle.style.animationDuration = Math.random() * 10 + 10 + 's';
        bg.appendChild(circle);
    }

    const healthMessages = {
        underweight: "وزنكِ رقيق جداً، اهتمي بالتغذية لتبرز مفاتنكِ أكثر.",
        normal: "وزنكِ مثالي وصحي جداً، أنتِ تملكين توازناً مذهلاً!",
        overweight: "لديكِ امتلاء أنثوي جذاب، حافظي على رشاقتكِ لتدوم.",
        obese: "جمالكِ فخم، لكن الصحة أولاً.. القليل من النشاط سيفيدكِ."
    };

    const database = {
        underweight: { 
            pear: { i: "يا لجمال ورقة قوامكِ! تملكين جسداً يشبه الغزال في خفته..", f: " وتلك الانحناءات الأنثوية الرقيقة تجعل منكِ أيقونة للجمال الهادئ. أنتِ جوهرة نادرة تلفت الأنظار بنعومتها الفائقة وسحرها الخاص!", a: "زيدي البروتين الصحي لإبراز جمالكِ أكثر." },
            hourglass: { i: "ما شاء الله! خصركِ المنحوت مع قوامكِ الرشيق يجعل منكِ لوحة فنية..", f: " تملكين تناسقاً مذهلاً يجمع بين الأنوثة والرقة في آن واحد، جمالكِ يسحر القلوب ويخطف الأنفاس!", a: "اليوغا ستحافظ على مرونة جسدكِ الفاتن." },
            apple: { i: "تملكين رقة وبراءة تسحر القلوب! حضوركِ هادئ وجسمكِ يعكس روحاً طيبة..", f: " جمالكِ الطبيعي يجعلكِ دائماً متميزة ومتألقة ببساطة لا تقاوم، فأنتِ تشعين سحراً وبساطة.", a: "المشي الخفيف يمنحكِ طاقة مذهلة." },
            rectangle: { i: "القامة الفارهة والهيبة الملكية! جسمكِ ممشوق كعارضات الأزياء..", f: " تملكين طولاً وتناسقاً يجعل أي رداء يبدو وكأنه صمم خصيصاً لكِ. حضوركِ دائماً ما يكون طاغياً وقوياً!", a: "تمارين المقاومة تزيد سحر قامتكِ." }
        },
        normal: { 
            pear: { i: "يا لهذا الجمال المتناغم! جسمكِ مرسوم بدقة يجمع بين الخصر الرقيق..", f: " والأنوثة الطاغية بشكل ساحر. أي شخص يراكِ سيدرك فوراً أنكِ تملكين قواماً مثالياً يجمع بين الرقي والجاذبية!", a: "حافظي على هذا التوازن، أنتِ في القمة." },
            hourglass: { i: "هذا هو القوام الأسطوري! خصركِ المنحوت يجعل منكِ ملكة حقيقية..", f: " تملكين تناسقاً يحلم به الجميع. جمالكِ متكامل لدرقة تفوق الخيال وأنوثتكِ تنبض بكل تفاصيلكِ الفاتنة!", a: "أنتِ مثال للتوازن، استمتعي بجمالكِ." },
            apple: { i: "وجهكِ يشع نوراً وجسمكِ ممتلئ بالثقة! تملكين كاريزما وحضوراً..", f: " يطغى على الجميع، وجمالكِ الطبيعي فيه سر يجذب القلوب إليكِ دون استئذان. أنتِ حقاً متميزة وفريدة!", a: "تمارين الشد ستزيدكِ جاذبية مذهلة." },
            rectangle: { i: "يا لجمال قامتكِ الممشوقة! جسمكِ رياضي ومتناسق بشكل مبهر..", f: " أي نوع من الملابس يبدو عليكِ غاية في الأناقة. تملكين سحراً عصرياً وجاذبية عالمية لا حدود لها!", a: "السكوات سيزيد من أنوثة قوامكِ." }
        },
        overweight: { 
            pear: { i: "الله يبارك على هذه الأنوثة الطاغية! جسمكِ ممتلئ بالفتنة والجاذبية..", f: " انحناءاتكِ عميقة وتلفت الأنظار بقوتها وسحرها الخاص. أنتِ رمز للجمال الأنثوي الحقيقي الذي يفرض نفسه!", a: "المشي يحافظ على هذه الطاقة العالية." },
            hourglass: { i: "الجمال الباذخ والفخامة! جسمكِ يشبه المنحوتات الكلاسيكية الفاخرة..", f: " انحناءاتكِ مرسومة بعمق وإغراء، وأنتِ تعكسين صورة الأنوثة الكاملة التي تملأ العين والقلب في وقت واحد!", a: "أبرزي جمال خصركِ، أنتِ تملكين قواماً نادراً." },
            apple: { i: "حضوركِ ملكي بامتياز! تملكين هيبة وجاذبية تملاً المكان بقوة ووقار..", f: " وجسمكِ يعطي انطباعاً بالقوة والجمال الناضج. روحكِ الجميلة تنعكس على جسدكِ لتجعل منكِ شخصية استثنائية!", a: "الاعتدال في السكريات يحافظ على إشراقتكِ." },
            rectangle: { i: "يا لجمال الهيبة والوقار! جسمكِ قوي ومعزز بالثقة والشموخ..", f: " جمالكِ ناضج ويفرض احترامه وجاذبيته في كل مكان. أنتِ امرأة تملكين حضوراً يملأ الأفق وقوة تلهم الآخرين!", a: "تمارين الخصر ستبرز رقتكِ أكثر." }
        },
        obese: { 
            pear: { i: "جمالكِ فخم وحضوركِ زلزال من الأنوثة! تملكين جسداً معبراً..", f: " عن الجمال الأصيل، انحناءاتكِ القوية تمنحكِ هيبة الملكات وجاذبية فريدة لا تُنسى. أنتِ رائعة ومميزة حقاً!", a: "القليل من النشاط سيزيد زينكِ بريقاً." },
            hourglass: { i: "يا لروعة هذا الزين! خصركِ ما زال واضحاً رغم كل شيء وجمالكِ فائق..", f: " أنتِ كتلة من الأنوثة والدلال، تملكين سحراً خاصاً جداً يملأ المكان بهجة وحيوية في كل إطلالة!", a: "الأكل الصحي سيجعلكِ تشعرين بخفة أكبر." },
            apple: { i: "شخصيتكِ طاغية وجمالكِ لا يخطئه أحد! حضوركِ يملأ العين..", f: " وقلبكِ الكبير ينعكس على ملامحكِ وجسدكِ الدافئ الجذاب. أنتِ مثال للجمال الذي يأسر القلوب بصدقه!", a: "الرياضة البسيطة ستحسن مزاجكِ وجمالكِ." },
            rectangle: { i: "أنتِ القوة والثبات والجمال الأصيل! جمالكِ فيه عمق وصدق..", f: " يجعلكِ محط احترام الجميع، وحضوركِ يفرض نفسه بوقار وجاذبية خاصة جداً تميزكِ عن كل من حولكِ!", a: "السباحة هي أفضل صديق لنحت جسمكِ." }
        }
    };

    function calculate() {
        const h = document.getElementById('height').value;
        const w = document.getElementById('weight').value;
        const s = document.getElementById('body-shape').value;
        if(!h || !w || !s) return alert("أدخلي بياناتكِ يا جميلة!");

        const bmi = (w / ((h/100)*(h/100))).toFixed(1);
        let cat = (bmi < 18.5) ? "underweight" : (bmi < 25) ? "normal" : (bmi < 30) ? "overweight" : "obese";
        
        document.getElementById('bmi-val').innerText = bmi;
        document.getElementById('health-desc').innerText = healthMessages[cat];

        const data = database[cat][s];
        document.getElementById('intro-text').innerText = data.i;
        document.getElementById('full-text').innerText = data.f;
        document.getElementById('advice-text').innerHTML = "<b>💡 نصيحة لجمالكِ:</b> " + data.a;
        document.getElementById('model-img').src = cat + "_" + s + ".png";

        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
    }

    function showFull() {
        document.getElementById('full-text').style.display = 'inline';
        document.getElementById('more-btn').style.display = 'none';
    }

    function shareResult() {
        const text = `بنات! لا يفوتكم هذا الموقع، قالي كلام يجنن عن جسمي وطلع نتيجتي بالـ 3D 😍🔥 جربوا من هنا:`;
        const url = window.location.href;
        if (navigator.share) { navigator.share({ title: 'Jissmy 3D', text: text, url: url }); } 
        else { window.open(`https://wa.me/?text=${encodeURIComponent(text + " " + url)}`); }
    }
</script>
</body>
</html>
