<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="اكتشفي شكل جسمك الحقيقي ثلاثي الأبعاد مع تحليل نفسي دقيق لقوامك.">
    <title>Qawamy 3D - تحليل الأنوثة الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* تصميم عصري زجاجي (Glassmorphism) */
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* خلفية متدرجة ليلية فخمة */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            text-align: center;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 35px 25px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.6s ease-out;
        }

        h1 { 
            font-size: 26px; 
            font-weight: 900; 
            margin-bottom: 5px; 
            background: linear-gradient(to left, #e0c3fc, #8ec5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { color: #b0b0b0; font-size: 14px; margin-bottom: 25px; }

        input, select { 
            width: 100%; 
            box-sizing: border-box; 
            padding: 16px; 
            margin: 12px 0; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.2); 
            color: #fff; 
            font-size: 15px; 
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #8ec5fc;
            box-shadow: 0 0 15px rgba(142, 197, 252, 0.3);
        }

        /* تنسيق قائمة الخيارات لتظهر بشكل جيد في الهواتف */
        select option { background: #24243e; color: #fff; }

        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            border-radius: 12px; 
            border: none;
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            color: #fff; 
            font-size: 18px; 
            font-weight: 700; 
            font-family: 'Cairo', sans-serif;
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6);
        }

        .error { color: #ff4d4d; font-size: 14px; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 8px; display: none; margin-bottom: 15px; }

        /* قسم النتيجة */
        #result-box { display: none; }
        
        .img-container {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        img.model-3d { width: 100%; height: 100%; object-fit: contain; }

        .bmi-badge {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .ghazal { font-size: 20px; font-weight: 900; line-height: 1.5; color: #fff; margin: 15px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .advice { color: #dcdcdc; font-size: 14px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border-left: 4px solid #8ec5fc; }
        .recalc-btn { background: rgba(255,255,255,0.1); box-shadow: none; border: 1px solid rgba(255,255,255,0.2); }
        .recalc-btn:hover { background: rgba(255,255,255,0.2); box-shadow: none; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="glass-card" id="input-screen">
    <h1>تحليل القوام 3D ✨</h1>
    <p class="subtitle">اكتشفي الأسرار المخفية لجمالك</p>
    
    <div id="error-msg" class="error">الرجاء إدخال قياسات منطقية (طول 130-195، وزن 35-150)</div>

    <input type="number" id="height" placeholder="الطول (سم) - مثال: 160">
    <input type="number" id="weight" placeholder="الوزن (كجم) - مثال: 60">
    
    <select id="body-shape">
        <option value="" disabled selected>ما هو أقرب شكل لجسمك؟</option>
        <option value="pear">كمثرى (الوزن يتركز بالأسفل)</option>
        <option value="hourglass">ساعة رملية (خصر نحيف)</option>
        <option value="apple">تفاحة (الوزن يتركز بالبطن)</option>
        <option value="rectangle">مستطيل (توازن بين الكتف والخصر)</option>
    </select>

    <button onclick="calculateResult()">ابدئي التحليل الآن</button>
</div>

<div class="glass-card" id="result-box">
    <div class="bmi-badge">مؤشر الكتلة: <span id="bmi-val" style="font-weight:bold; color:#8ec5fc;"></span></div>
    
    <div class="img-container">
        <img id="model-img" class="model-3d" src="" alt="جاري التحميل...">
    </div>
    
    <div class="ghazal" id="ghazal-text"></div>
    <div class="advice" id="advice-text"></div>

    <button class="recalc-btn" onclick="location.reload()">تحليل جديد</button>
</div>

<script>
    const database = {
        underweight: { 
            pear: { ghazal: "رقتكِ ناعمة، وتركيز أنوثتكِ بالأسفل يمنحكِ سحراً خاصاً.", advice: "ركزي على تمارين الجزء السفلي لنحت تفاصيلك." },
            hourglass: { ghazal: "خصركِ المنحوت مع رقتكِ يخلقان توازناً فنياً نادراً.", advice: "التغذية الغنية بالبروتين ستبرز جمال هيكلك." },
            apple: { ghazal: "جاذبيتكِ هادئة، وقوامكِ يحمل براءة تخطف الأنظار.", advice: "تمارين الكارديو الخفيفة ستوازن قوامك بشكل مثالي." },
            rectangle: { ghazal: "قوامكِ الممشوق كعارضات الأزياء يفرض أناقته بهدوء.", advice: "التمارين المركبة ستمنحك انحناءات مذهلة." }
        },
        normal: { 
            pear: { ghazal: "انحناءاتكِ السفلية هندسة جمالية تنطق بالأنوثة الطاغية.", advice: "حافظي على هذا السحر بالحركة المستمرة وشرب الماء." },
            hourglass: { ghazal: "أنتِ التوازن الكامل، سيمفونية تجمع الفتنة والوقار.", advice: "قوامكِ مثالي، استمري في أسلوب حياتك الحالي." },
            apple: { ghazal: "حضوركِ لافت، وجاذبيتكِ تكمن في ثقتكِ العالية.", advice: "تمارين الخصر والبطن ستجعلكِ لوحة خالية من العيوب." },
            rectangle: { ghazal: "تناسقكِ الرياضي يمنحكِ هيبة وجاذبية عصرية ساحرة.", advice: "تمارين المقاومة ستبرز تفاصيل عضلاتكِ الأنثوية." }
        },
        overweight: { 
            pear: { ghazal: "امتلاؤكِ باذخ، فوضى أنثوية فاتنة تسرق الأنفاس.", advice: "المشي اليومي سيحافظ على مرونة هذا القوام الجميل." },
            hourglass: { ghazal: "انحناءاتكِ العميقة زلزال هادئ يربك كل من يراه.", advice: "قسوة الرياضة ستحولكِ إلى أسطورة حقيقية." },
            apple: { ghazal: "جاذبيتكِ طاغية، تمتلكين حضوراً يطغى على المكان.", advice: "تقليل السكريات خطوتكِ الأولى لمزيد من الرشاقة." },
            rectangle: { ghazal: "قوامكِ يعكس قوة وجمالاً ناضجاً يفرض هيبته.", advice: "تمارين نحت الخصر ستصنع فرقاً جباراً في إطلالتك." }
        },
        obese: { 
            pear: { ghazal: "أنوثتكِ طاغية وممتلئة بالتفاصيل التي تلفت الأنظار.", advice: "خطوات بسيطة يومياً ستزيد من خفة حركتك." },
            hourglass: { ghazal: "رغم الامتلاء، خصركِ لا يزال يحكي قصة جمال أصيل.", advice: "الغذاء الصحي المتوازن هو مفتاحك لإشراقة دائمة." },
            apple: { ghazal: "حضوركِ قوي ومميز، شخصيتكِ تنعكس على هيبتك.", advice: "الاستمرارية في الحركة الخفيفة ستمنحك طاقة هائلة." },
            rectangle: { ghazal: "أنتِ كتلة من القوة والثبات، جمالكِ يكمن في ثقتك.", advice: "ابحثي عن نشاط رياضي ممتع لتجديد نشاطكِ." }
        }
    };

    function calculateResult() {
        const heightInput = document.getElementById('height').value;
        const weightInput = document.getElementById('weight').value;
        const shapeInput = document.getElementById('body-shape').value;
        const errorMsg = document.getElementById('error-msg');

        if(!heightInput || !weightInput || !shapeInput) {
            errorMsg.innerText = "الرجاء تعبئة جميع الحقول واختيار شكل الجسم.";
            errorMsg.style.display = "block";
            return;
        }

        const h = parseFloat(heightInput);
        const w = parseFloat(weightInput);

        if(h < 130 || h > 195 || w < 35 || w > 150) {
            errorMsg.innerText = "الرجاء إدخال قياسات منطقية وصحيحة.";
            errorMsg.style.display = "block";
            return;
        }

        errorMsg.style.display = "none";

        const hInMeters = h / 100;
        const bmi = (w / (hInMeters * hInMeters)).toFixed(1);

        let weightCategory = "";
        if(bmi < 18.5) weightCategory = "underweight";
        else if(bmi >= 18.5 && bmi <= 24.9) weightCategory = "normal";
        else if(bmi >= 25 && bmi <= 29.9) weightCategory = "overweight";
        else weightCategory = "obese";

        const resultData = database[weightCategory][shapeInput];

        // الميزة الجديدة: دمج اسم الصورة تلقائياً بصيغة PNG
        // سيقوم الكود بالبحث عن صورة تتطابق مع (فئة الوزن_شكل الجسم.png)
        const expectedImageName = weightCategory + "_" + shapeInput + ".png";

        document.getElementById('bmi-val').innerText = bmi;
        document.getElementById('ghazal-text').innerText = resultData.ghazal;
        document.getElementById('advice-text').innerText = resultData.advice;
        document.getElementById('model-img').src = expectedImageName; 

        document.getElementById('input-screen').style.display = "none";
        document.getElementById('result-box').style.display = "block";
    }
</script>

</body>
</html>
